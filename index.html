<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Tracker - Fonksiyonel Güncelleme</title>
<style>
body{font-family:Arial;background:#111827;color:white;margin:0;padding:20px;}
h1{text-align:center;}
.container{max-width:950px;margin:auto;}
input,select,button{padding:8px;margin:4px;border-radius:6px;border:none;}
button{background:#22c55e;color:white;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;margin-top:20px;}
.card{background:#1f2937;padding:0;border-radius:10px;position:relative;overflow:hidden;transition: transform 0.2s;}
.card img{width:100%;display:block;transition: transform 0.2s;}
.card:hover img{transform: scale(1.05);}
.card .info{position:absolute;bottom:0;left:0;width:100%;background:rgba(0,0,0,0.6);padding:5px;color:white;font-size:12px;line-height:1.2;}
.card .delete{position:absolute;top:5px;right:5px;background:red;color:white;border:none;border-radius:4px;padding:2px 6px;cursor:pointer;}
</style>
</head>
<body>
<div class="container">
<h1>🎮 Media Tracker Güncelleme</h1>

<input id="title" placeholder="İsim">
<select id="type" onchange="updateStatusOptions()">
<option>Film</option>
<option>Dizi</option>
<option>Kitap</option>
<option>Oyun</option>
</select>

<select id="status">
</select>

<button onclick="addItem()">Ekle</button>
<input id="search" placeholder="Ara..." oninput="render()">
<select id="filter" onchange="render()">
<option value="all">Tümü</option>
<option value="Film">Film</option>
<option value="Dizi">Dizi</option>
<option value="Kitap">Kitap</option>
<option value="Oyun">Oyun</option>
</select>

<div class="grid" id="grid"></div>
</div>

<script>
const OMDB_KEY = "BURAYA_OMDB_KEY";
const RAWG_KEY = "BURAYA_RAWG_KEY";

let items = JSON.parse(localStorage.getItem("items") || "[]");

function getStatusOptions(type){
  switch(type){
    case "Film": case "Dizi": return ["İzliyorum","Tamamlandı"];
    case "Oyun": return ["Oynuyorum","Tamamlandı"];
    case "Kitap": return ["Okuyorum","Tamamlandı"];
    default: return ["Tamamlandı"];
  }
}

function updateStatusOptions(){
  let type = document.getElementById("type").value;
  let statusSelect = document.getElementById("status");
  statusSelect.innerHTML = "";
  getStatusOptions(type).forEach(s => {
    let opt = document.createElement("option");
    opt.value = s; opt.textContent = s;
    statusSelect.appendChild(opt);
  });
}

// Başlangıçta status dropdown’u doldur
updateStatusOptions();

async function fetchInfo(item){
  try{
    if(item.type==="Film" || item.type==="Dizi"){
      if(!OMDB_KEY){return;}
      let res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(item.title)}&apikey=${OMDB_KEY}`);
      let data = await res.json();
      item.poster = data.Poster && data.Poster!=="N/A"?data.Poster:"https://via.placeholder.com/150x220?text=No+Image";
      item.score = data.imdbRating || "-";
      item.extra = data.Runtime || "-";
    } else if(item.type==="Oyun"){
      if(!RAWG_KEY){return;}
      let res = await fetch(`https://api.rawg.io/api/games?key=${RAWG_KEY}&search=${encodeURIComponent(item.title)}`);
      let data = await res.json();
      if(data.results && data.results.length>0){
        let g = data.results[0];
        item.poster = g.background_image || "https://via.placeholder.com/150x220?text=No+Image";
        item.score = g.metacritic || "-";
        item.extra = g.released || "-";
      }
    } else if(item.type==="Kitap"){
      let res = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(item.title)}`);
      let data = await res.json();
      if(data.docs && data.docs.length>0){
        let b = data.docs[0];
        item.poster = b.cover_i ? `https://covers.openlibrary.org/b/id/${b.cover_i}-L.jpg` : "https://via.placeholder.com/150x220?text=No+Image";
        item.score = "-";
        item.extra = b.first_publish_year || "-";
      }
    }
  }catch(e){console.log("Hata:",e);}
}

async function addItem(){
  let title = document.getElementById("title").value;
  let type = document.getElementById("type").value;
  let status = document.getElementById("status").value;
  if(!title){alert("Başlık gir!"); return;}
  let newItem = {title,type,status,poster:"https://via.placeholder.com/150x220?text=Yükleniyor",score:"-",extra:"-"};
  items.push(newItem);
  save();
  render();
  await fetchInfo(newItem);
  save();
  render();
}

function deleteItem(index){
  if(confirm("Silmek istediğine emin misin?")){
    items.splice(index,1);
    save();
    render();
  }
}

function save(){localStorage.setItem("items",JSON.stringify(items))}

function render(){
  let grid = document.getElementById("grid");
  grid.innerHTML="";
  let searchVal = document.getElementById("search").value.toLowerCase();
  let filterVal = document.getElementById("filter").value;

  items.forEach((item,index)=>{
    if(filterVal!=="all" && item.type!==filterVal) return;
    if(searchVal && !item.title.toLowerCase().includes(searchVal)) return;

    let card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <button class="delete" onclick="deleteItem(${index})">X</button>
      <img src="${item.poster}" alt="${item.title}">
      <div class="info">
        <strong>${item.title}</strong><br>
        ${item.type} | ${item.status}<br>
        Puan: ${item.score} | ${item.extra}
      </div>
    `;
    grid.appendChild(card);
  });
}

render();
</script>
</body>
</html>
